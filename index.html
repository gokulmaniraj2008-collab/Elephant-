<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>African Elephant 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    #canvas-container { flex: 1; position: relative; overflow: hidden; }

    #info {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      color: #ccc; background: rgba(0,0,0,0.5);
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      pointer-events: none; white-space: nowrap; z-index: 10;
    }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white; font-size: 20px; text-align: center; z-index: 10;
    }

    /* Scrollable button bar at bottom */
    #controls {
      background: rgba(0,0,0,0.75);
      padding: 10px 12px;
      overflow-x: auto;
      white-space: nowrap;
      display: none;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
    }
    #controls::-webkit-scrollbar { height: 4px; }
    #controls::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .anim-btn {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      margin-right: 8px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .anim-btn.active {
      background: #4a90e2;
      border-color: #4a90e2;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="loading">Loading elephant... 🐘</div>
    <div id="info">🖱️ Drag to rotate · Scroll to zoom</div>
  </div>
  <div id="controls"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    const container = document.getElementById('canvas-container');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 2, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(5, 10, 7);
    scene.add(dir);

    let mixer, actions = {}, currentAction = null;

    const loader = new THREE.GLTFLoader();
    loader.load("scene.gltf",
      (gltf) => {
        document.getElementById('loading').style.display = 'none';

        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const scale = 3 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));
        scene.add(model);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach(clip => { actions[clip.name] = mixer.clipAction(clip); });

          const panel = document.getElementById('controls');
          panel.style.display = 'block';

          gltf.animations.forEach((clip, i) => {
            const btn = document.createElement('button');
            btn.className = 'anim-btn';
            btn.textContent = clip.name || `Anim ${i+1}`;
            btn.addEventListener('click', () => playAnimation(clip.name, btn));
            panel.appendChild(btn);
          });

          // Play first by default
          playAnimation(gltf.animations[0].name, panel.querySelector('.anim-btn'));
          document.getElementById('info').textContent = '🐘 Tap animation below · Drag to rotate';
        }

        const clock = new THREE.Clock();
        (function animate() {
          requestAnimationFrame(animate);
          if (mixer) mixer.update(clock.getDelta());
          renderer.render(scene, camera);
        })();
      },
      (progress) => {
        if (progress.total > 0) {
          const pct = Math.round((progress.loaded / progress.total) * 100);
          document.getElementById('loading').textContent = `Loading elephant... ${pct}% 🐘`;
        }
      },
      (error) => {
        document.getElementById('loading').textContent = '❌ Could not load model.';
        console.error(error);
      }
    );

    function playAnimation(name, btn) {
      if (currentAction) currentAction.fadeOut(0.3);
      const action = actions[name];
      action.reset().fadeIn(0.3).play();
      currentAction = action;
      document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }

    // Mouse controls
    let isDragging = false, prevX = 0, prevY = 0;
    let rotX = 0, rotY = 0, zoom = 6;

    container.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
    document.addEventListener('mouseup', () => isDragging = false);
    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      rotY += (e.clientX - prevX) * 0.5;
      rotX += (e.clientY - prevY) * 0.5;
      prevX = e.clientX; prevY = e.clientY;
      updateCamera();
    });
    container.addEventListener('wheel', e => {
      zoom = Math.max(1, Math.min(20, zoom + e.deltaY * 0.01));
      updateCamera();
    });

    // Touch controls
    let lastTouch = null;
    container.addEventListener('touchstart', e => { lastTouch = e.touches[0]; });
    container.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      rotY += (t.clientX - lastTouch.clientX) * 0.5;
      rotX += (t.clientY - lastTouch.clientY) * 0.5;
      lastTouch = t;
      updateCamera();
    }, { passive: false });

    function updateCamera() {
      const phi = THREE.MathUtils.degToRad(rotX);
      const theta = THREE.MathUtils.degToRad(rotY);
      camera.position.x = zoom * Math.sin(theta) * Math.cos(phi);
      camera.position.y = zoom * Math.sin(phi) + 2;
      camera.position.z = zoom * Math.cos(theta) * Math.cos(phi);
      camera.lookAt(0, 0, 0);
    }

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    (function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); })();
  </script>
</body>
</html>
