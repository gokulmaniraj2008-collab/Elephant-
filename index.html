<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>African Elephant 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: sans-serif; }
    #info {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      color: #ccc; background: rgba(0,0,0,0.5);
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      pointer-events: none; white-space: nowrap;
    }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white; font-size: 20px; text-align: center;
    }
    #error {
      display: none;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b; font-size: 16px; text-align: center;
      background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading elephant... 🐘</div>
  <div id="error"></div>
  <div id="info">🖱️ Drag to rotate · Scroll to zoom</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    // Load from same folder — no raw.githubusercontent.com
    const MODEL = "scene.gltf";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(5, 10, 7);
    scene.add(dir);

    const loader = new THREE.GLTFLoader();
    loader.load(
      MODEL,
      (gltf) => {
        document.getElementById('loading').style.display = 'none';
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const scale = 3 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));
        scene.add(model);

        let mixer;
        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach(clip => mixer.clipAction(clip).play());
          document.getElementById('info').textContent =
            `🐘 ${gltf.animations.length} animation(s) · Drag to rotate · Scroll to zoom`;
        }

        const clock = new THREE.Clock();
        (function animate() {
          requestAnimationFrame(animate);
          if (mixer) mixer.update(clock.getDelta());
          renderer.render(scene, camera);
        })();
      },
      (progress) => {
        if (progress.total > 0) {
          const pct = Math.round((progress.loaded / progress.total) * 100);
          document.getElementById('loading').textContent = `Loading elephant... ${pct}% 🐘`;
        }
      },
      (error) => {
        document.getElementById('loading').style.display = 'none';
        const err = document.getElementById('error');
        err.style.display = 'block';
        err.innerHTML = '❌ Could not load model.<br>Check browser console for details.';
        console.error(error);
      }
    );

    // Mouse controls
    let isDragging = false, prevX = 0, prevY = 0;
    let rotX = 0, rotY = 0, zoom = 6;

    document.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
    document.addEventListener('mouseup', () => isDragging = false);
    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      rotY += (e.clientX - prevX) * 0.5;
      rotX += (e.clientY - prevY) * 0.5;
      prevX = e.clientX; prevY = e.clientY;
      updateCamera();
    });
    document.addEventListener('wheel', e => {
      zoom = Math.max(1, Math.min(20, zoom + e.deltaY * 0.01));
      updateCamera();
    });

    // Touch controls
    let lastTouch = null;
    document.addEventListener('touchstart', e => { lastTouch = e.touches[0]; });
    document.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      rotY += (t.clientX - lastTouch.clientX) * 0.5;
      rotX += (t.clientY - lastTouch.clientY) * 0.5;
      lastTouch = t;
      updateCamera();
    }, { passive: false });

    function updateCamera() {
      const phi = THREE.MathUtils.degToRad(rotX);
      const theta = THREE.MathUtils.degToRad(rotY);
      camera.position.x = zoom * Math.sin(theta) * Math.cos(phi);
      camera.position.y = zoom * Math.sin(phi) + 2;
      camera.position.z = zoom * Math.cos(theta) * Math.cos(phi);
      camera.lookAt(0, 0, 0);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    (function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); })();
  </script>
</body>
</html>
