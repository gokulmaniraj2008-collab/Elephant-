<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>African Elephant 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #info {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      color: #ccc; background: rgba(0,0,0,0.5);
      padding: 8px 16px; border-radius: 20px; font-size: 13px;
      pointer-events: none;
    }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white; font-size: 20px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading elephant... 🐘</div>
  <div id="info">🖱️ Drag to rotate · Scroll to zoom · Right-click drag to pan</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Scene ──────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // ── Camera ─────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 6);

    // ── Renderer ───────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // ── Lights ─────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // ── Load GLtF model ────────────────────────────────────
    // Using a simple fetch + parse approach compatible with r128
    async function loadGLTF(url) {
      const loader = document.createElement('script');
      return new Promise((resolve, reject) => {
        // We'll use THREE.ObjectLoader via fetch and manual parse
        fetch(url)
          .then(r => r.json())
          .then(gltf => resolve(gltf))
          .catch(reject);
      });
    }

    // ── Simple GLTF Loader (inline, no imports needed) ─────
    const script1 = document.createElement('script');
    script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
    document.head.appendChild(script1);

    script1.onload = () => {
      // Load GLTFLoader from CDN
      const script2 = document.createElement('script');
      script2.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
      document.head.appendChild(script2);

      script2.onload = () => {
        const loader = new THREE.GLTFLoader();
        loader.load(
          'scene.gltf',
          (gltf) => {
            document.getElementById('loading').style.display = 'none';

            const model = gltf.scene;

            // Center and scale the model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 3 / maxDim;

            model.scale.setScalar(scale);
            model.position.sub(center.multiplyScalar(scale));

            scene.add(model);

            // ── Play animation if any ──────────────────────
            let mixer;
            if (gltf.animations && gltf.animations.length > 0) {
              mixer = new THREE.AnimationMixer(model);
              gltf.animations.forEach(clip => mixer.clipAction(clip).play());

              const info = document.getElementById('info');
              info.textContent = `🐘 ${gltf.animations.length} animation(s) playing · Drag to rotate · Scroll to zoom`;
            }

            // ── Animate loop ───────────────────────────────
            const clock = new THREE.Clock();
            function animate() {
              requestAnimationFrame(animate);
              if (mixer) mixer.update(clock.getDelta());
              renderer.render(scene, camera);
            }
            animate();
          },
          (progress) => {
            const pct = Math.round((progress.loaded / progress.total) * 100);
            document.getElementById('loading').textContent = `Loading elephant... ${pct}% 🐘`;
          },
          (error) => {
            document.getElementById('loading').textContent = 'Error loading model. Open in a local server.';
            console.error(error);
          }
        );
      };
    };

    // ── Orbit controls (mouse drag) ────────────────────────
    let isDragging = false, isRightDrag = false;
    let prevX = 0, prevY = 0;
    let rotX = 0, rotY = 0;
    let panX = 0, panY = 0;
    let zoom = 6;

    document.addEventListener('mousedown', e => {
      isDragging = true;
      isRightDrag = e.button === 2;
      prevX = e.clientX; prevY = e.clientY;
    });
    document.addEventListener('mouseup', () => isDragging = false);
    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      if (isRightDrag) {
        panX += dx * 0.01; panY -= dy * 0.01;
      } else {
        rotY += dx * 0.5; rotX += dy * 0.5;
      }
      prevX = e.clientX; prevY = e.clientY;
      updateCamera();
    });
    document.addEventListener('wheel', e => {
      zoom += e.deltaY * 0.01;
      zoom = Math.max(1, Math.min(20, zoom));
      updateCamera();
    });
    document.addEventListener('contextmenu', e => e.preventDefault());

    function updateCamera() {
      const phi = THREE.MathUtils.degToRad(rotX);
      const theta = THREE.MathUtils.degToRad(rotY);
      camera.position.x = panX + zoom * Math.sin(theta) * Math.cos(phi);
      camera.position.y = panY + zoom * Math.sin(phi) + 2;
      camera.position.z = zoom * Math.cos(theta) * Math.cos(phi);
      camera.lookAt(panX, panY, 0);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start basic render loop even before model loads
    function basicLoop() {
      requestAnimationFrame(basicLoop);
      renderer.render(scene, camera);
    }
    basicLoop();
  </script>
</body>
</html>
