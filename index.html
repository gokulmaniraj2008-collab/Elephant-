<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elephant Fight 🐘⚔️🐘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: sans-serif; overflow: hidden; height: 100vh; }

    /* Canvas fills everything EXCEPT bottom 70px */
    #canvas-container {
      position: fixed; top: 0; left: 0; right: 0; bottom: 70px;
    }

    /* Buttons ALWAYS pinned to bottom */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 70px;
      background: #000;
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .btn {
      border: none; border-radius: 24px;
      padding: 12px 26px; font-size: 15px;
      cursor: pointer; font-weight: bold;
    }
    #btn-fight { background: #e53935; color: #fff; }
    #btn-reset { background: #444; color: #fff; }
    #btn-walk  { background: #333; color: #ccc; }

    #title {
      position: fixed; top: 12px; left: 50%;
      transform: translateX(-50%);
      color: #fff; background: rgba(0,0,0,0.6);
      padding: 6px 18px; border-radius: 20px; font-size: 14px;
      pointer-events: none; white-space: nowrap; z-index: 10;
    }
    #status {
      position: fixed; top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff; font-size: 30px; font-weight: bold;
      text-shadow: 0 0 20px rgba(255,100,0,0.9);
      pointer-events: none; z-index: 10;
      opacity: 0; transition: opacity 0.3s; text-align: center;
    }
    #hp-bars {
      position: fixed; top: 48px; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 0 12px; z-index: 10; pointer-events: none;
    }
    .hp-wrap { width: 44%; }
    .hp-label { color: #ccc; font-size: 11px; margin-bottom: 3px; }
    .hp-bar-bg { background: rgba(255,255,255,0.15); border-radius: 6px; height: 10px; overflow: hidden; }
    .hp-bar { height: 100%; border-radius: 6px; transition: width 0.4s; }
    #hp1-bar { background: #4caf50; width: 100%; }
    #hp2-bar { background: #f44336; width: 100%; }
    #loading {
      position: fixed; top: 45%; left: 50%;
      transform: translate(-50%, -50%);
      color: white; font-size: 20px; z-index: 20;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="loading">Loading elephants... 🐘🐘</div>
  <div id="title">🐘 Elephant Arena ⚔️</div>
  <div id="hp-bars">
    <div class="hp-wrap">
      <div class="hp-label">🐘 Elephant 1</div>
      <div class="hp-bar-bg"><div class="hp-bar" id="hp1-bar"></div></div>
    </div>
    <div class="hp-wrap">
      <div class="hp-label" style="text-align:right">Elephant 2 🐘</div>
      <div class="hp-bar-bg"><div class="hp-bar" id="hp2-bar"></div></div>
    </div>
  </div>
  <div id="status"></div>
  <div id="controls">
    <button class="btn" id="btn-walk">🚶 Walk</button>
    <button class="btn" id="btn-fight">⚔️ FIGHT!</button>
    <button class="btn" id="btn-reset">🔄 Reset</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
    const container = document.getElementById('canvas-container');
    const W = () => container.clientWidth;
    const H = () => container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 6),
      new THREE.MeshLambertMaterial({ color: 0x2d4a1e })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.55;
    scene.add(ground);

    const camera = new THREE.PerspectiveCamera(50, W() / H(), 0.1, 1000);
    camera.position.set(0, 1.2, 8);
    camera.lookAt(0, 0.3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(W(), H());
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(3, 8, 5);
    scene.add(dir);

    let mixer1, mixer2, actions1 = {}, actions2 = {};
    let current1 = null, current2 = null;
    let hp1 = 100, hp2 = 100;
    let fightInterval = null, fightActive = false, loaded = 0;

    function loadElephant(side) {
      new THREE.GLTFLoader().load("scene.gltf", (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const scale = 2.0 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(scale);
        model.position.copy(center.multiplyScalar(-scale));
        if (side === 1) {
          model.position.x = -2.0;
          model.rotation.y = Math.PI / 2;
          mixer1 = new THREE.AnimationMixer(model);
          gltf.animations.forEach(c => actions1[c.name] = mixer1.clipAction(c));
        } else {
          model.position.x = 2.0;
          model.rotation.y = -Math.PI / 2;
          mixer2 = new THREE.AnimationMixer(model);
          gltf.animations.forEach(c => actions2[c.name] = mixer2.clipAction(c));
          model.traverse(child => {
            if (child.isMesh && child.material) {
              child.material = child.material.clone();
              child.material.color.multiplyScalar(0.6);
            }
          });
        }
        scene.add(model);
        if (++loaded === 2) {
          document.getElementById('loading').style.display = 'none';
          playAnim(1, 'Loco_WalkSlow');
          playAnim(2, 'Loco_WalkSlow');
        }
      }, (p) => {
        if (p.total > 0)
          document.getElementById('loading').textContent =
            `Loading... ${Math.round(p.loaded/p.total*100)}% 🐘🐘`;
      });
    }

    loadElephant(1); loadElephant(2);

    function playAnim(side, name, loop = true) {
      const acts = side === 1 ? actions1 : actions2;
      const cur  = side === 1 ? current1 : current2;
      if (!acts[name]) return;
      if (cur) cur.fadeOut(0.25);
      const a = acts[name];
      a.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
      a.clampWhenFinished = !loop;
      a.reset().fadeIn(0.25).play();
      if (side === 1) current1 = a; else current2 = a;
    }

    function showStatus(txt, ms = 1200) {
      const el = document.getElementById('status');
      el.textContent = txt; el.style.opacity = 1;
      setTimeout(() => el.style.opacity = 0, ms);
    }

    function updateHP() {
      document.getElementById('hp1-bar').style.width = Math.max(0, hp1) + '%';
      document.getElementById('hp2-bar').style.width = Math.max(0, hp2) + '%';
    }

    function startFight() {
      if (fightActive) return;
      fightActive = true; hp1 = 100; hp2 = 100; updateHP();
      showStatus('⚔️ FIGHT!', 1200);
      playAnim(1, 'Loco_WalkSlow'); playAnim(2, 'Loco_WalkSlow');
      setTimeout(() => {
        if (!fightActive) return;
        runRound();
        fightInterval = setInterval(() => {
          if (!fightActive || hp1 <= 0 || hp2 <= 0) { endFight(); return; }
          runRound();
        }, 2200);
      }, 1000);
    }

    function runRound() {
      const atk = Math.random() < 0.5 ? 1 : 2;
      const def = atk === 1 ? 2 : 1;
      const moves = ['Attack_1','Attack_2','Attack_3'];
      const move = moves[Math.floor(Math.random() * 3)];
      const dmg = Math.floor(Math.random() * 20) + 10;
      playAnim(atk, move, false);
      setTimeout(() => playAnim(def, 'Hit_1', false), 350);
      setTimeout(() => {
        if (atk === 1) { hp2 = Math.max(0, hp2 - dmg); showStatus(`🐘1 hits! -${dmg}`, 800); }
        else           { hp1 = Math.max(0, hp1 - dmg); showStatus(`🐘2 hits! -${dmg}`, 800); }
        updateHP();
        setTimeout(() => {
          if (hp1 > 0) playAnim(1, 'Loco_WalkSlow');
          if (hp2 > 0) playAnim(2, 'Loco_WalkSlow');
          if (hp1 <= 0 || hp2 <= 0) endFight();
        }, 700);
      }, 550);
    }

    function endFight() {
      fightActive = false; clearInterval(fightInterval);
      if (hp1 <= 0) { playAnim(1,'Death',false); playAnim(2,'Roar',false); showStatus('🏆 Elephant 2 Wins!', 3500); }
      else          { playAnim(2,'Death',false); playAnim(1,'Roar',false); showStatus('🏆 Elephant 1 Wins!', 3500); }
    }

    function resetAll() {
      fightActive = false; clearInterval(fightInterval);
      hp1 = 100; hp2 = 100; updateHP();
      document.getElementById('status').style.opacity = 0;
      playAnim(1,'Stand_01'); playAnim(2,'Stand_01');
    }

    document.getElementById('btn-fight').onclick = startFight;
    document.getElementById('btn-reset').onclick = resetAll;
    document.getElementById('btn-walk').onclick = () => { resetAll(); setTimeout(() => { playAnim(1,'Loco_WalkSlow'); playAnim(2,'Loco_WalkSlow'); }, 100); };

    let drag = false, prevX = 0, rotY = 0;
    container.addEventListener('mousedown', e => { drag = true; prevX = e.clientX; });
    document.addEventListener('mouseup', () => drag = false);
    document.addEventListener('mousemove', e => {
      if (!drag) return;
      rotY = Math.max(-60, Math.min(60, rotY + (e.clientX - prevX) * 0.4));
      prevX = e.clientX; updateCam();
    });
    let lt = null;
    container.addEventListener('touchstart', e => { lt = e.touches[0]; });
    container.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      rotY = Math.max(-60, Math.min(60, rotY + (t.clientX - lt.clientX) * 0.4));
      lt = t; updateCam();
    }, { passive: false });

    function updateCam() {
      const th = THREE.MathUtils.degToRad(rotY);
      camera.position.set(8 * Math.sin(th), 1.2, 8 * Math.cos(th));
      camera.lookAt(0, 0.3, 0);
    }

    window.addEventListener('resize', () => {
      camera.aspect = W() / H();
      camera.updateProjectionMatrix();
      renderer.setSize(W(), H());
    });

    const clock = new THREE.Clock();
    (function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      if (mixer1) mixer1.update(dt);
      if (mixer2) mixer2.update(dt);
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
